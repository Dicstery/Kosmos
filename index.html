<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>Kosmos – Real Stars</title>
  <link rel="icon" type="image/x-icon" href="favicon.ico" />
  <style>
    * { margin: 0; padding: 0; }
    html, body { overflow: hidden; font-family: 'Trispace', sans-serif; background: black; }
    canvas { display: block; }
    #loading {
      position: fixed; display: flex; width: 100%; height: 100%;
      color: white; justify-content: center; align-items: center;
      top: 0; left: 0; background-color: black; z-index: 100;
    }
    #welcome { text-align: center; }
    #welcome h1 { font-size: 2.5rem; font-weight: 800; opacity: 0; animation: fadeIn 2s ease-in-out 0.5s forwards; }
    #welcome p { margin: 0.5rem 0; opacity: 0; }
    #welcome #createdBy { font-weight: 200; animation: fadeIn 2s ease-in-out 1.2s forwards; }
    #welcome #name { font-weight: 500; animation: fadeIn 2s ease-in-out 2s forwards; }
    @keyframes fadeIn { to { opacity: 1; } }
    @keyframes pulse {
      0% { transform: scale(1.5) rotate(0deg); }
      50% { transform: scale(3) rotate(720deg); }
      100% { transform: scale(1.5) rotate(-180deg); }
    }
    #loader-progress {
      display: flex; justify-content: space-between; margin-top: 1.5rem;
      font-weight: 100; font-size: 0.9rem; opacity: 0;
      animation: fadeIn 2s ease-in-out 3s forwards;
    }
    #loader { margin-top: 2rem; display: flex; justify-content: center; }
    #loader-circle {
      width: 70px; height: 70px; border-radius: 50%; overflow: hidden;
      opacity: 0; animation: fadeIn 2s ease-in-out 2.5s forwards;
    }
    #loader-circle svg { animation: pulse 2s ease-in-out 4.5s infinite; }
    .planet-info {
      display: none; position: fixed; left: 1%; top: 25%; width: 30%; z-index: 20;
    }
    .planet-info-content {
      background-color: rgba(0, 0, 35, 0.9); padding: 20px;
      border: 1px solid #888; box-shadow: 0px 0px 10px 3px rgba(255,255,0,0.5);
      color: white; font-family: 'Arial', sans-serif; overflow-y: auto;
    }
    .close-btn {
      color: lightyellow; float: right; font-size: 28px; font-weight: bold;
    }
    .close-btn:hover, .close-btn:focus { color: white; cursor: pointer; }
    h2 { color: lightyellow; }
    p { color: white; line-height: 1.5; }
    .btn-group {
      display: flex; position: absolute; top: 20px; justify-content: center;
      width: 100%; gap: 12px; fill: white; z-index: 10;
    }
    .btn-group button {
      background: rgba(0,0,0,0.5); border: none; cursor: pointer;
      padding: 8px; border-radius: 50%; display: flex; align-items: center;
      transition: background 0.2s;
    }
    .btn-group button:hover { background: rgba(255,255,255,0.2); }
  </style>
</head>
<body>
  <div id="loading">
    <div id="welcome">
      <h1>Kosmos</h1>
      <p><span id="createdBy">создал</span> <span id="name">Dicstery</span></p>
      <div id="loader-progress">
        <div id="loader-text">Загрузка звёзд...</div>
        <div id="loader-percentage">0%</div>
      </div>
      <div id="loader">
        <div id="loader-circle">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">

8 0 0 0 7.4 4.95 8 8 0 0 0 7.41-11.09l-6.55-15.8zM325.58 403.04l-6.54-15.8a8"/>
          </svg>
        </div>
      </div>
    </div>
  </div>

  <div class="btn-group">
    <button id="btn-ambient">
      <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24"><path d="M12 0c-6.627 0-12 5.373-12 12s5.373 12 12 12 12-5.373 12-12-5.373-12-12-12zm0 21c-4.971 0-9-4.029-9-9s4.029-9 9-9 9 4.029 9 9-4.029 9-9 9zm0-16c-3.86 0-7 3.14-7 7s3.14 7 7 7 7-3.14 7-7-3.14-7-7-7zm0 4c1.654 0 3 1.346 3 3s-1.346 3-3 3-3-1.346-3-3 1.346-3 3-3zm0-2c-2.762 0-5 2.238-5 5s2.238 5 5 5 5-2.238 5-5-2.238-5-5-5zm-4-2h2v2h-2zm6 0h2v2h-2zm-9 4h2v2h-2zm14 0h2v2h-2zm-9 6h2v2h-2zm6 0h2v2h-2z"/></svg>
    </button>
    <button id="btn-labels">
      <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24"><path d="M12 2c-5.514 0-10 4.486-10 10s4.486 10 10 10 10-4.486 10-10-4.486-10-10-10zm0 18c-4.411 0-8-3.589-8-8s3.589-8 8-8 8 3.589 8 8-3.589 8-8 8zm-1-7h2v2h-2zm0 4h2v2h-2zm4-4h2v2h-2zm-8 0h2v2h-2zm8-4h2v2h-2zm-8 0h2v2h-2zm4-4h2v2h-2z"/></svg>
    </button>
    <button id="btn-paths">
      <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24"><path d="M12 2c-5.514 0-10 4.486-10 10s4.486 10 10 10 10-4.486 10-10-4.486-10-10-10zm0 18c-4.411 0-8-3.589-8-8s3.589-8 8-8 8 3.589 8 8-3.589 8-8 8zm-1-12h2v2h-2zm0 4h2v2h-2zm4-4h2v2h-2zm0 4h2v2h-2zm-8 0h2v2h-2zm0-4h2v2h-2z"/></svg>
    </button>
  </div>

  <div id="planetInfo" class="planet-info">
    <div class="planet-info-content">
      <span class="close-btn" onclick="closeInfo()">&times;</span>
      <h2 id="planetName"></h2>
      <p id="planetDetails"></p>
    </div>
  </div>

  <script type="importmap">
    {
      "imports": {
        "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
        "three/examples/jsm/controls/OrbitControls.js": "https://unpkg.com/three@0.160.0/examples/jsm/controls/OrbitControls.js",
        "three/examples/jsm/postprocessing/EffectComposer.js": "https://unpkg.com/three@0.160.0/examples/jsm/postprocessing/EffectComposer.js",
        "three/examples/jsm/postprocessing/UnrealBloomPass.js": "https://unpkg.com/three@0.160.0/examples/jsm/postprocessing/UnrealBloomPass.js",
        "three/examples/jsm/postprocessing/RenderPass.js": "https://unpkg.com/three@0.160.0/examples/jsm/postprocessing/RenderPass.js",
        "three/examples/jsm/postprocessing/OutlinePass.js": "https://unpkg.com/three@0.160.0/examples/jsm/postprocessing/OutlinePass.js",
        "three/examples/jsm/loaders/GLTFLoader.js": "https://unpkg.com/three@0.160.0/examples/jsm/loaders/GLTFLoader.js",
        "three/examples/jsm/renderers/CSS2DRenderer.js": "https://unpkg.com/three@0.160.0/examples/jsm/renderers/CSS2DRenderer.js"
      }
    }
  </script>

  <script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/examples/jsm/controls/OrbitControls.js';
    import { EffectComposer } from 'three/examples/jsm/postprocessing/EffectComposer.js';
    import { UnrealBloomPass } from 'three/examples/jsm/postprocessing/UnrealBloomPass.js';
    import { RenderPass } from 'three/examples/jsm/postprocessing/RenderPass.js';
    import { OutlinePass } from 'three/examples/jsm/postprocessing/OutlinePass.js';
    import { GLTFLoader } from 'three/examples/jsm/loaders/GLTFLoader.js';
    import { CSS2DRenderer, CSS2DObject } from 'three/examples/jsm/renderers/CSS2DRenderer.js';

    THREE.ColorManagement.enabled = false;

    const manager = new THREE.LoadingManager();
    const textureLoader = new THREE.TextureLoader(manager);
    const gltfLoader = new GLTFLoader(manager);

    const progressBar = document.getElementById('loader-percentage');
    const progressText = document.getElementById('loader-text');
    const loadingScreen = document.getElementById('loading');

    let starsPointCloud = null;

    function updateProgress(percent, text = null) {
      progressBar.textContent = percent + '%';
      if (text) progressText.textContent = text;
    }

    function hideLoadingScreen() {
      progressText.textContent = 'Click to continue...';
      loadingScreen.style.cursor = 'pointer';
      loadingScreen.addEventListener('click', () => {
        loadingScreen.style.display = 'none';
      });
    }

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x000005);

    const camera = new THREE.PerspectiveCamera(45, window.innerWidth/window.innerHeight, 0.1, 100000);
    camera.position.set(0, 200, 400);

    const renderer = new THREE.WebGLRenderer({ antialias: true, powerPreference: "high-performance" });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.toneMapping = THREE.ACESFilmicToneMapping;
    renderer.shadowMap.enabled = true;
    renderer.shadowMap.type = THREE.PCFSoftShadowMap;
    document.body.appendChild(renderer.domElement);

    const labelRenderer = new CSS2DRenderer();
    labelRenderer.setSize(window.innerWidth, window.innerHeight);
    document.body.appendChild(labelRenderer.domElement);

    const composer = new EffectComposer(renderer);
    const renderPass = new RenderPass(scene, camera);
    composer.addPass(renderPass);

    const outlinePass = new OutlinePass(new THREE.Vector2(window.innerWidth, window.innerHeight), scene, camera);
    outlinePass.edgeStrength = 3;
    outlinePass.edgeGlow = 1;
    outlinePass.visibleEdgeColor.set(0xffffff);
    outlinePass.hiddenEdgeColor.set(0x190a05);
    composer.addPass(outlinePass);

    const bloomPass = new UnrealBloomPass(new THREE.Vector2(window.innerWidth, window.innerHeight), 1.5, 0.4, 0.85);
    bloomPass.threshold = 0.6;
    bloomPass.strength = 1.2;
    bloomPass.radius = 0.8;
    composer.addPass(bloomPass);

    const ambientLight = new THREE.AmbientLight(0x111122, 4);
    scene.add(ambientLight);
    const pointLight = new THREE.PointLight(0xFDFFD3, 2200, 600, 1.2);
    pointLight.castShadow = true;
    pointLight.shadow.mapSize.width = 2048;
    pointLight.shadow.mapSize.height = 2048;
    pointLight.shadow.camera.near = 1;
    pointLight.shadow.camera.far = 1000;
    pointLight.shadow.bias = -0.0005;
    pointLight.shadow.radius = 2;
    scene.add(pointLight);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.dampingFactor = 0.75;
    controls.screenSpacePanning = false;
    controls.maxDistance = 50000;
    controls.target.set(0, 0, 0);
    controls.update();

    const raycaster = new THREE.Raycaster();
    const mouse = new THREE.Vector2();

    function onMouseMove(event) {
      mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
      mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;
    }

    let selectedPlanet = null;
    let isMovingTowardsPlanet = false;
    let targetCameraPosition = new THREE.Vector3();
    let isZoomingOut = false;
    const zoomOutTargetPosition = new THREE.Vector3(0, 200, 400);

    const planetData = {
      'Sun': { radius: '432,000 km', tilt: '0°', rotation: '600 hours', orbit: '-', distance: '0', moons: '8 planets', info: 'The star at the center of our solar system.' },
      'Mercury': { radius: '2,439.7 km', tilt: '0.034°', rotation: '58.6 days', orbit: '88 days', distance: '57.9 million km', moons: '0', info: 'Smallest planet and closest to the Sun.' },
      'Venus': { radius: '6,051.8 km', tilt: '177.4°', rotation: '243 days', orbit: '225 days', distance: '108.2 million km', moons: '0', info: 'Second planet, extreme temperatures.' },
      'Earth': { radius: '6,371 km', tilt: '23.5°', rotation: '24 hours', orbit: '365 days', distance: '150 million km', moons: '1 (Moon)', info: 'Our home planet, the only known planet with life.' },
      'Mars': { radius: '3,389.5 km', tilt: '25.19°', rotation: '1.03 days', orbit: '687 days', distance: '227.9 million km', moons: '2 (Phobos, Deimos)', info: 'The Red Planet.' },
      'Jupiter': { radius: '69,911 km', tilt: '3.13°', rotation: '9.9 hours', orbit: '12 years', distance: '778.5 million km', moons: '95 (Io, Europa, Ganymede, Callisto)', info: 'Largest planet, Great Red Spot.' },
      'Saturn': { radius: '58,232 km', tilt: '26.73°', rotation: '10.7 hours', orbit: '29.5 years', distance: '1.4 billion km', moons: '146 (Titan)', info: 'Ringed gas giant.' },
      'Uranus': { radius: '25,362 km', tilt: '97.77°', rotation: '17.2 hours', orbit: '84 years', distance: '2.9 billion km', moons: '27', info: 'Ice giant with extreme tilt.' },
      'Neptune': { radius: '24,622 km', tilt: '28.32°', rotation: '16.1 hours', orbit: '165 years', distance: '4.5 billion km', moons: '14 (Triton)', info: 'Outermost planet, deep blue.' },
      'Pluto': { radius: '1,188.3 km', tilt: '122.53°', rotation: '6.4 days', orbit: '248 years', distance: '5.9 billion km', moons: '5 (Charon)', info: 'Dwarf planet.' }
    };

    function showPlanetInfo(planetName) {
      const info = document.getElementById('planetInfo');
      const nameEl = document.getElementById('planetName');
      const detailsEl = document.getElementById('planetDetails');
      const data = planetData[planetName];
      if (data) {
        nameEl.textContent = planetName;
        detailsEl.textContent = `Radius: ${data.radius}\nTilt: ${data.tilt}\nRotation: ${data.rotation}\nOrbit: ${data.orbit}\nDistance: ${data.distance}\nMoons: ${data.moons}\nInfo: ${data.info}`;
        info.style.display = 'block';
      }
    }

    window.closeInfo = function() {
      document.getElementById('planetInfo').style.display = 'none';
      isZoomingOut = true;
      controls.target.set(0, 0, 0);
    };

    function closeInfoNoZoomOut() {
      document.getElementById('planetInfo').style.display = 'none';
    }

    const earthNightTex = textureLoader.load('images/textures/earth_nightmap.jpg');
    const earthDayTex = textureLoader.load('images/textures/earth_daymap.jpg');
    const earthMaterial = new THREE.ShaderMaterial({
      uniforms: { dayTexture: { value: earthDayTex }, nightTexture: { value: earthNightTex }, sunPosition: { value: new THREE.Vector3(0, 0, 0) } },
      vertexShader: `varying vec3 vNormal; varying vec2 vUv; varying vec3 vSunDirection; uniform vec3 sunPosition; void main() { vUv = uv; vec4 worldPosition = modelMatrix * vec4(position, 1.0); vNormal = normalize(modelMatrix * vec4(normal, 0.0)).xyz; vSunDirection = normalize(sunPosition - worldPosition.xyz); gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0); }`,
      fragmentShader: `uniform sampler2D dayTexture; uniform sampler2D nightTexture; varying vec3 vNormal; varying vec2 vUv; varying vec3 vSunDirection; void main() { float intensity = max(dot(vNormal, vSunDirection), 0.0); vec4 dayColor = texture2D(dayTexture, vUv); vec4 nightColor = texture2D(nightTexture, vUv) * 0.2; gl_FragColor = mix(nightColor, dayColor, intensity); }`
    });

    function createCloudShader(baseColor, speed, intensity) {
      return new THREE.ShaderMaterial({
        uniforms: { time: { value: 0 }, baseTexture: { value: null }, color: { value: new THREE.Color(baseColor) }, speed: { value: speed }, intensity: { value: intensity } },
        vertexShader: `varying vec2 vUv; void main() { vUv = uv; gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0); }`,
        fragmentShader: `uniform float time; uniform sampler2D baseTexture; uniform vec3 color; uniform float speed; uniform float intensity; varying vec2 vUv;
          float noise(vec2 p) { return fract(sin(dot(p, vec2(12.9898, 78.233))) * 43758.5453); }
          float smoothNoise(vec2 p) { vec2 i = floor(p); vec2 f = fract(p); float a = noise(i); float b = noise(i + vec2(1.0, 0.0)); float c = noise(i + vec2(0.0, 1.0)); float d = noise(i + vec2(1.0, 1.0)); vec2 u = f * f * (3.0 - 2.0 * f); return mix(mix(a, b, u.x), mix(c, d, u.x), u.y); }
          float fbm(vec2 p) { float value = 0.0; float amp = 0.5; vec2 shift = vec2(100.0); for (int i = 0; i < 4; i++) { value += amp * smoothNoise(p); p = p * 2.0 + shift; amp *= 0.5; } return value; }
          void main() { vec2 uv = vUv; float cloudNoise = fbm(uv * 8.0 + time * speed); vec4 texColor = texture2D(baseTexture, uv); vec3 mixed = mix(texColor.rgb, color, cloudNoise * intensity); gl_FragColor = vec4(mixed, texColor.a); }`
      });
    }

    function createPlanet(name, size, position, tilt, texture, bump, ring, atmosphere, moons) {
      let material;
      const isGasGiant = (name === 'Jupiter' || name === 'Saturn');
      if (name === 'Earth') { material = earthMaterial; }
      else if (isGasGiant && texture) {
        const cloudMat = createCloudShader('#ffffff', 0.08, 0.5);
        cloudMat.uniforms.baseTexture.value = textureLoader.load(texture);
        material = cloudMat;
      } else if (bump) {
        material = new THREE.MeshPhongMaterial({ map: textureLoader.load(texture), bumpMap: textureLoader.load(bump), bumpScale: 0.7, specular: new THREE.Color(0x333333), shininess: 15 });
      } else {
        material = new THREE.MeshPhongMaterial({ map: textureLoader.load(texture), specular: new THREE.Color(0x111111), shininess: 5 });
      }
      const geometry = new THREE.SphereGeometry(size, 64, 64);
      const planet = new THREE.Mesh(geometry, material);
      planet.name = name; planet.castShadow = true; planet.receiveShadow = true;
      const planetSystem = new THREE.Group(); planetSystem.add(planet);
      planet.position.x = position; planet.rotation.z = tilt * Math.PI / 180;
      const orbitPath = new THREE.EllipseCurve(0, 0, position, position, 0, 2 * Math.PI, false, 0);
      const pathPoints = orbitPath.getPoints(128);
      const orbitGeometry = new THREE.BufferGeometry().setFromPoints(pathPoints);
      const orbitMaterial = new THREE.LineBasicMaterial({ color: 0xFFFFFF, transparent: true, opacity: 0.03 });
      const orbit = new THREE.LineLoop(orbitGeometry, orbitMaterial);
      orbit.rotation.x = Math.PI / 2; planetSystem.add(orbit);
      let Ring, Atmosphere;
      if (ring) {
        const RingGeo = new THREE.RingGeometry(ring.innerRadius, ring.outerRadius, 64);
        const RingMat = new THREE.MeshStandardMaterial({ map: textureLoader.load(ring.texture), side: THREE.DoubleSide });
        Ring = new THREE.Mesh(RingGeo, RingMat); Ring.receiveShadow = true;
        Ring.position.x = position; Ring.rotation.x = -0.5 * Math.PI; Ring.rotation.y = -tilt * Math.PI / 180;
        planetSystem.add(Ring);
      }
      if (atmosphere) {
        const atmosphereGeom = new THREE.SphereGeometry(size + 0.1, 64, 64);
        const atmosphereMat = new THREE.MeshPhongMaterial({ map: textureLoader.load(atmosphere), transparent: true, opacity: 0.4, depthTest: true, depthWrite: false });
        Atmosphere = new THREE.Mesh(atmosphereGeom, atmosphereMat); Atmosphere.rotation.z = 0.41;
        planet.add(Atmosphere); Atmosphere.receiveShadow = true;
      }
      const planet3d = new THREE.Object3D(); planet3d.add(planetSystem); scene.add(planet3d);
      const obj = { name, planet, planet3d, Atmosphere, planetSystem, Ring, moons: [] };
      if (moons) {
        moons.forEach(moonDef => {
          let moonMat;
          if (moonDef.bump) { moonMat = new THREE.MeshStandardMaterial({ map: textureLoader.load(moonDef.texture), bumpMap: textureLoader.load(moonDef.bump), bumpScale: 0.5 }); }
          else { moonMat = new THREE.MeshStandardMaterial({ map: textureLoader.load(moonDef.texture) }); }
          const moonGeo = new THREE.SphereGeometry(moonDef.size, 32, 32);
          const moonMesh = new THREE.Mesh(moonGeo, moonMat);
          moonMesh.castShadow = true; moonMesh.receiveShadow = true;
          planet.add(moonMesh);
          obj.moons.push({ mesh: moonMesh, orbitRadius: moonDef.orbitRadius, orbitSpeed: moonDef.orbitSpeed });
        });
      }
      return obj;
    }

    const mercury = createPlanet('Mercury', 2.4, 40, 0, 'images/textures/mercurymap.jpg', 'images/textures/mercurybump.jpg');
    const venus = createPlanet('Venus', 6.1, 65, 3, 'images/textures/venusmap.jpg', 'images/textures/venusmap.jpg', null, 'images/textures/venus_atmosphere.jpg');
    const earthMoonDef = [{ size: 1.6, texture: 'images/textures/moonmap.jpg', bump: 'images/textures/moonbump.jpg', orbitSpeed: 0.001, orbitRadius: 10 }];
    const earth = createPlanet('Earth', 6.4, 90, 23, null, null, null, 'images/textures/earth_atmosphere.jpg', earthMoonDef);
    const mars = createPlanet('Mars', 3.4, 115, 25, 'images/textures/marsmap.jpg', 'images/textures/marsbump.jpg');
    const jupiter = createPlanet('Jupiter', 69/4, 200, 3, 'images/textures/jupiter.jpg');
    const saturn = createPlanet('Saturn', 58/4, 270, 26, 'images/textures/saturnmap.jpg', null, { innerRadius: 18, outerRadius: 29, texture: 'images/textures/saturn_ring.png' });
    const uranus = createPlanet('Uranus', 25/4, 320, 82, 'images/textures/uranus.jpg', null, { innerRadius: 6, outerRadius: 8, texture: 'images/textures/uranus_ring.png' });
    const neptune = createPlanet('Neptune', 24/4, 340, 28, 'images/textures/neptune.jpg');
    const pluto = createPlanet('Pluto', 1, 350, 57, 'images/textures/plutomap.jpg');

    const sunSize = 697/40;
    const sunGeom = new THREE.SphereGeometry(sunSize, 64, 64);
    const sunMat = new THREE.MeshStandardMaterial({ emissive: 0xFFF88F, emissiveMap: textureLoader.load('images/textures/sun.jpg'), emissiveIntensity: 2.2 });
    const sun = new THREE.Mesh(sunGeom, sunMat);
    sun.name = 'Sun'; scene.add(sun);

    const allPlanets = [mercury, venus, earth, mars, jupiter, saturn, uranus, neptune, pluto];
    const allMoons = [];

    function addMoon(parentPlanet, def) {
      const moonObj = { mesh: new THREE.Mesh(new THREE.SphereGeometry(def.size, 32, 32), new THREE.MeshStandardMaterial({ map: textureLoader.load(def.texture) })), orbitRadius: def.orbitRadius, orbitSpeed: def.orbitSpeed };
      moonObj.mesh.castShadow = true; moonObj.mesh.receiveShadow = true;
      parentPlanet.planet.add(moonObj.mesh);
      allMoons.push(moonObj);
      return moonObj;
    }

    addMoon(jupiter, { size: 1.2, texture: 'images/textures/io.jpg', orbitRadius: 20, orbitSpeed: 0.0005 });
    addMoon(jupiter, { size: 1.0, texture: 'images/textures/europa.jpg', orbitRadius: 24, orbitSpeed: 0.00025 });
    addMoon(jupiter, { size: 1.5, texture: 'images/textures/ganymede.jpg', orbitRadius: 28, orbitSpeed: 0.000125 });
    addMoon(jupiter, { size: 1.3, texture: 'images/textures/callisto.jpg', orbitRadius: 32, orbitSpeed: 0.00006 });
    addMoon(saturn, { size: 1.4, texture: 'images/textures/titan.webp', orbitRadius: 36, orbitSpeed: 0.00008 });
    addMoon(neptune, { size: 1.1, texture: 'images/textures/triton.jpg', orbitRadius: 14, orbitSpeed: 0.00004 });

    const raycastTargets = [
      mercury.planet, venus.planet, venus.Atmosphere, earth.planet, earth.Atmosphere,
      mars.planet, jupiter.planet, saturn.planet, uranus.planet, neptune.planet, pluto.planet
    ];

    function onMouseDown(event) {
      mouse.x = (event.clientX / renderer.domElement.clientWidth) * 2 - 1;
      mouse.y = -(event.clientY / renderer.domElement.clientHeight) * 2 + 1;
      raycaster.setFromCamera(mouse, camera);
      const intersects = raycaster.intersectObjects(raycastTargets);
      if (intersects.length > 0) {
        const clicked = intersects[0].object;
        let planetObj = null, name = null;
        if (clicked === venus.Atmosphere) { planetObj = venus; name = 'Venus'; }
        else if (clicked === earth.Atmosphere) { planetObj = earth; name = 'Earth'; }
        else {
          for (const p of allPlanets) {
            if (clicked === p.planet) { planetObj = p; name = p.name; break; }
          }
        }
        if (planetObj) {
          closeInfoNoZoomOut();
          const pos = new THREE.Vector3();
          planetObj.planet.getWorldPosition(pos);
          controls.target.copy(pos);
          let off = 10;
          if (name === 'Sun') off = 50;
          else if (name === 'Jupiter' || name === 'Saturn') off = 50;
          else if (name === 'Venus' || name === 'Earth' || name === 'Uranus') off = 25;
          else if (name === 'Mars') off = 15;
          targetCameraPosition.copy(pos).add(camera.position.clone().sub(pos).normalize().multiplyScalar(off));
          isMovingTowardsPlanet = true;
          selectedPlanet = name;
        }
      }
    }

    const clock = new THREE.Clock(true);
    let elapsedTime = 0;

    function animate() {
      elapsedTime += clock.getDelta() * 0.125;

      if (jupiter.planet.material.uniforms) jupiter.planet.material.uniforms.time.value = elapsedTime;
      if (saturn.planet.material.uniforms) saturn.planet.material.uniforms.time.value = elapsedTime;

      sun.rotateY(0.001);
      mercury.planet.rotateY(0.001);
      mercury.planet3d.rotateY(0.004);
      venus.planet.rotateY(0.0005);
      if (venus.Atmosphere) venus.Atmosphere.rotateY(0.0005);
      venus.planet3d.rotateY(0.0006);
      earth.planet.rotateY(0.005);
      if (earth.Atmosphere) earth.Atmosphere.rotateY(0.001);
      earth.planet3d.rotateY(0.001);
      mars.planet.rotateY(0.01);
      mars.planet3d.rotateY(0.0007);
      jupiter.planet.rotateY(0.005);
      jupiter.planet3d.rotateY(0.0003);
      saturn.planet.rotateY(0.01);
      saturn.planet3d.rotateY(0.0002);
      uranus.planet.rotateY(0.005);
      uranus.planet3d.rotateY(0.0001);
      neptune.planet.rotateY(0.005);
      neptune.planet3d.rotateY(0.00008);
      pluto.planet.rotateY(0.001);
      pluto.planet3d.rotateY(0.00006);

      if (earth.moons) {
        earth.moons.forEach(moon => {
          const time = performance.now();
          const tiltAngle = 5 * Math.PI / 180;
          moon.mesh.position.x = Math.cos(time * moon.orbitSpeed) * moon.orbitRadius;
          moon.mesh.position.y = Math.sin(time * moon.orbitSpeed) * moon.orbitRadius * Math.sin(tiltAngle);
          moon.mesh.position.z = Math.sin(time * moon.orbitSpeed) * moon.orbitRadius * Math.cos(tiltAngle);
          moon.mesh.rotateY(0.01);
        });
      }

      allMoons.forEach(moon => {
        const time = performance.now();
        moon.mesh.position.x = Math.cos(time * moon.orbitSpeed) * moon.orbitRadius;
        moon.mesh.position.z = Math.sin(time * moon.orbitSpeed) * moon.orbitRadius;
        moon.mesh.rotateY(0.01);
      });

      if (isMovingTowardsPlanet) {
        camera.position.lerp(targetCameraPosition, 0.03);
        if (camera.position.distanceTo(targetCameraPosition) < 1) {
          isMovingTowardsPlanet = false;
          showPlanetInfo(selectedPlanet);
        }
      } else if (isZoomingOut) {
        camera.position.lerp(zoomOutTargetPosition, 0.05);
        if (camera.position.distanceTo(zoomOutTargetPosition) < 1) isZoomingOut = false;
      }

      raycaster.setFromCamera(mouse, camera);
      const intersects = raycaster.intersectObjects(raycastTargets);
      outlinePass.selectedObjects = [];
      if (intersects.length > 0) {
        const obj = intersects[0].object;
        if (obj === earth.Atmosphere) outlinePass.selectedObjects = [earth.planet];
        else if (obj === venus.Atmosphere) outlinePass.selectedObjects = [venus.planet];
        else outlinePass.selectedObjects = [obj];
      }

      controls.update();
      composer.render();
      labelRenderer.render(scene, camera);
      requestAnimationFrame(animate);
    }

    async function loadStarCatalog() {
      try {
        const partNames = ['data/stars1.csv', 'data/stars2.csv', 'data/stars3.csv'];
        let combinedText = '';
        for (let i = 0; i < partNames.length; i++) {
          updateProgress(Math.round((i / partNames.length) * 100), `Загрузка части ${i+1}...`);
          const resp = await fetch(partNames[i]);
          if (!resp.ok) throw new Error(`Ошибка загрузки ${partNames[i]}`);
          combinedText += await resp.text();
        }
        updateProgress(100, 'Парсинг звёзд...');
        const positions = [];
        const colors = [];
        const lines = combinedText.split('\n');
        for (let line of lines) {
          line = line.trim();
          if (line.startsWith('id,') || line === '') continue;
          const cols = line.split(',');
          if (cols.length < 8) continue;
          const ra = parseFloat(cols[1]);
          const dec = parseFloat(cols[2]);
          const dist = parseFloat(cols[3]);
          const mag = parseFloat(cols[4]);
          if (isNaN(ra) || isNaN(dec) || isNaN(dist) || isNaN(mag)) continue;
          const raRad = ra * Math.PI / 180;
          const decRad = dec * Math.PI / 180;
          const x = dist * Math.cos(decRad) * Math.cos(raRad);
          const y = dist * Math.sin(decRad);
          const z = dist * Math.cos(decRad) * Math.sin(raRad);
          positions.push(x, y, z);
          const brightness = Math.max(0.2, 1.0 - mag / 10.0);
          colors.push(brightness, brightness * 0.9, brightness * 0.7);
        }
        if (positions.length === 0) throw new Error('Нет данных звёзд');
        const geom = new THREE.BufferGeometry();
        geom.setAttribute('position', new THREE.BufferAttribute(new Float32Array(positions), 3));
        geom.setAttribute('color', new THREE.BufferAttribute(new Float32Array(colors), 3));
        const mat = new THREE.PointsMaterial({
          size: 0.5,
          vertexColors: true,
          blending: THREE.AdditiveBlending,
          depthWrite: false,
          transparent: true,
          opacity: 0.9
        });
        starsPointCloud = new THREE.Points(geom, mat);
        scene.add(starsPointCloud);
        updateProgress(100, 'Готово');
        hideLoadingScreen();
      } catch (err) {
        console.error(err);
        updateProgress(0, 'Ошибка загрузки каталога');
        hideLoadingScreen();
      }
    }

    loadStarCatalog();

    window.addEventListener('mousemove', onMouseMove);
    window.addEventListener('mousedown', onMouseDown);
    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
      labelRenderer.setSize(window.innerWidth, window.innerHeight);
      composer.setSize(window.innerWidth, window.innerHeight);
    });

    document.getElementById('btn-ambient').addEventListener('click', () => {
      ambientLight.intensity = ambientLight.intensity === 4 ? 1 : 4;
    });
    document.getElementById('btn-paths').addEventListener('click', () => {
      const visible = !allPlanets[0]?.planet3d.children[0]?.children[1]?.visible;
      allPlanets.forEach(p => {
        if (p.planet3d.children[0]?.children[1]) p.planet3d.children[0].children[1].visible = visible;
      });
    });

    animate();
  </script>
</body>
</html>
